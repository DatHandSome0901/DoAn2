<script>
let topics = [];
let currentTopicId = null;

// ================= TYPING =================
function typeEffectHTML(el, text) {
  el.innerHTML = "";
  let i = 0;

  let timer = setInterval(() => {
    if (text[i] === "<") {
      let end = text.indexOf(">", i);
      el.innerHTML += text.slice(i, end + 1);
      i = end + 1;
    } else {
      el.innerHTML += text[i++];
    }

    if (i >= text.length) clearInterval(timer);
  }, 5);
}

// ================= COPY =================
function copyOne(el) {
  let text = el.parentElement.previousElementSibling.innerText;
  navigator.clipboard.writeText(text);
}

// ================= LOAD =================
function loadTopicsFromServer() {
  fetch("/topics")
    .then(res => res.json())
    .then(data => {
      topics = data;
      renderSidebar();

      if (topics.length > 0) {
        openTopic(topics[0].id);
      }
    });
}

// ================= SIDEBAR =================
function renderSidebar() {
  let list = document.getElementById("topic-list");
  list.innerHTML = "";

  topics.forEach(t => {
    let div = document.createElement("div");
    div.className = "topic-item";

    div.innerHTML = `
      <span onclick="openTopic(${t.id})">${t.title}</span>
      <button class="delete-topic" onclick="event.stopPropagation(); deleteTopic(${t.id})">❌</button>
    `;

    list.appendChild(div);
  });
}

// ================= OPEN =================
function openTopic(id) {
  currentTopicId = id;
  let topic = topics.find(t => t.id === id);

  let chat = document.getElementById("chat-box");
  chat.innerHTML = "";

  if (!topic || !topic.content) return;

  let botDiv = document.createElement("div");
  botDiv.className = "bot";
  botDiv.innerHTML = topic.content.replace(/\n/g, "<br>");
  chat.appendChild(botDiv);

  let tools = document.createElement("div");
  tools.className = "msg-tools";
  tools.innerHTML = `
    <span onclick="copyOne(this)">📋</span>
    <a href="/download/${topic.file}">⬇</a>
  `;
  chat.appendChild(tools);
}

// ================= DELETE =================
function deleteTopic(id) {
  if (!confirm("Xóa topic?")) return;

  fetch("/delete_topic", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id})
  }).then(loadTopicsFromServer);
}

// ================= NEW =================
function newTopic() {
  document.getElementById("chat-box").innerHTML = "";
  document.getElementById("topic").value = "";
}

// ================= GENERATE =================
function generate() {
  let topic = document.getElementById("topic").value;
  let n = parseInt(document.getElementById("num").value);

  if (!topic) return alert("Nhập chủ đề!");

  let chat = document.getElementById("chat-box");

  chat.innerHTML += `<div class="user">Chủ đề: ${topic}</div>`;
  document.getElementById("loading").style.display = "block";

  fetch("/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({topic, n})
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("loading").style.display = "none";

    let botDiv = document.createElement("div");
    botDiv.className = "bot typing";
    chat.appendChild(botDiv);

    let html = data.questions.replace(/\n/g, "<br>");
    typeEffectHTML(botDiv, html);

    let tools = document.createElement("div");
    tools.className = "msg-tools";
    tools.innerHTML = `
      <span onclick="copyOne(this)">📋</span>
      <a href="/download/${data.file}">⬇</a>
    `;
    chat.appendChild(tools);

    chat.scrollTop = chat.scrollHeight;

    loadTopicsFromServer();
  });
}

// ================= INIT =================
loadTopicsFromServer();
</script>
<div class="chat">

  <!-- 🔥 NÚT LOGOUT -->
  <a href="/logout" class="logout-btn">🔓 Logout</a>

  <div id="chat-box"></div>
</body>
